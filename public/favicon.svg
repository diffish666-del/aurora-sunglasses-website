<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sunglasses shape -->
  <circle cx="35" cy="50" r="20" fill="url(#grad)" stroke="#0c4a6e" stroke-width="3"/>
  <circle cx="65" cy="50" r="20" fill="url(#grad)" stroke="#0c4a6e" stroke-width="3"/>
  <line x1="55" y1="50" x2="45" y2="50" stroke="#0c4a6e" stroke-width="4"/>
  <line x1="15" y1="50" x2="20" y2="45" stroke="#0c4a6e" stroke-width="4"/>
  <line x1="80" y1="50" x2="85" y2="45" stroke="#0c4a6e" stroke-width="4"/>
  <!-- Shine effect -->
  <ellipse cx="30" cy="45" rx="5" ry="3" fill="white" opacity="0.3"/>
  <ellipse cx="60" cy="45" rx="5" ry="3" fill="white" opacity="0.3"/>
</svg>
